name: Refresh release data

# Rebuilds data/releases.json on a schedule by re-running scripts/build_data.py
# against the upstream Claude Code sources, commits any change, and publishes
# the static site to GitHub Pages.
#
# To track a different repo: edit scripts/build_data.py (CHANGELOG_URL,
# RELEASES_API_URL, WHATS_NEW_INDEX_URL) and push.

on:
  schedule:
    # every 6 hours, on the hour
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write       # for the data commit
  pages: write          # for Pages deploy
  id-token: write       # for Pages deploy auth

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data/releases.json
        env:
          # Authenticated GitHub API gets 5000/hr instead of 60/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_data.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/releases.json)" ]]; then
            git config user.name  "release-tracker-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/releases.json
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No data changes."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the site — index.html, assets/, data/.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
